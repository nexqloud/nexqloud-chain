services:
  seed:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        GITHUB_TOKEN: ${GITHUB_TOKEN}
    container_name: nexqloud-seed
    hostname: seed
    networks:
      - nxqnet
    user: "0"
    env_file:
      - .env
    volumes:
      - seed-data:/root/.nxqd
      - genesis-share:/var/www/html
      - ./run_seed.sh:/root/run_seed.sh:ro
    command: >-
      bash -c "
        if [ ! -f /root/.nxqd/config/genesis.json ]; then
          echo '==> Initialising seed node...'
          bash /root/run_seed.sh init || { echo 'ERROR: init failed'; exit 1; }
        else
          echo '==> Seed data already present, skipping init.'
        fi
        echo '==> Starting seed node...'
        exec bash /root/run_seed.sh
      "
    ports:
      - "26656:26656"   # P2P
      - "26657:26657"   # Tendermint RPC
      - "8545:8545"     # Ethereum JSON-RPC (HTTP)
      - "8546:8546"     # Ethereum JSON-RPC (WebSocket)
      - "9090:9090"     # gRPC
      - "1317:1317"     # REST API
    environment:
      - MONIKER=NexQloudSeed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:26657/status"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  # --------------------------------------------------------------------------
  # Genesis file server (nginx)
  # Serves genesis.json and node-id written by the seed init script.
  # --------------------------------------------------------------------------
  web:
    image: nginx:alpine
    container_name: nexqloud-web
    hostname: web
    networks:
      - nxqnet
    volumes:
      - genesis-share:/usr/share/nginx/html:ro
    ports:
      - "80:80"
    depends_on:
      - seed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/node-id"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

networks:
  nxqnet:
    driver: bridge

volumes:
  seed-data:
    driver: local
  genesis-share:
    driver: local

